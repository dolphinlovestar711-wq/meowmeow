<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>購物車｜毛孩好伴 Pet Paradise</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css?v=20260718-8" rel="stylesheet">
</head>
<body class="cart-page">
  <nav class="navbar bg-white">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <img class="brand-logo" src="images/logo.png" alt="毛孩好伴 Logo">
        <span>毛孩好伴</span>
      </a>
      <a class="cart-home-link" href="index.html">
        <i class="bi bi-house-door-fill"></i>
        回首頁
      </a>
    </div>
  </nav>

  <main class="cart-main">
    <div class="container">
      <section class="cart-panel" aria-labelledby="cart-title">
        <div class="cart-heading">
          <div>
            <p class="cart-eyebrow">PET PARADISE</p>
            <h1 id="cart-title"><i class="bi bi-cart3"></i> 我的購物車</h1>
          </div>
          <button class="clear-cart-button" id="clear-cart" type="button">
            <i class="bi bi-trash3"></i>
            清空購物車
          </button>
        </div>

        <div class="table-responsive">
          <table class="table cart-table align-middle">
            <thead>
              <tr>
                <th scope="col">序號</th>
                <th scope="col">商品項目</th>
                <th scope="col">單價</th>
                <th scope="col">數量</th>
                <th scope="col">小計</th>
                <th scope="col"><span class="visually-hidden">操作</span></th>
              </tr>
            </thead>
            <tbody id="cart-items"></tbody>
          </table>
        </div>

        <div class="empty-cart" id="empty-cart" hidden>
          <i class="bi bi-cart-x"></i>
          <h2>購物車目前是空的</h2>
          <p>回到首頁挑選毛孩喜歡的商品吧！</p>
          <a href="index.html#products">前往選購</a>
        </div>

        <div class="cart-summary" id="cart-summary">
          <span>總金額</span>
          <strong id="cart-total">NT$ 0</strong>
        </div>
      </section>
    </div>
  </main>

  <script src="js/cart-page.js?v=20260718-1"></script>
</body>
</html>

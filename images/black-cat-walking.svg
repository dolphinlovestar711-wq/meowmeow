<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 165">
  <style>
    .leg {
      transform-box: fill-box;
      transform-origin: 50% 0;
    }
    .leg-a {
      animation: leg-forward .55s ease-in-out infinite alternate;
    }
    .leg-b {
      animation: leg-back .55s ease-in-out infinite alternate;
    }
    @keyframes leg-forward {
      from { transform: rotate(-18deg); }
      to { transform: rotate(18deg); }
    }
    @keyframes leg-back {
      from { transform: rotate(18deg); }
      to { transform: rotate(-18deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .leg { animation: none; }
    }
  </style>

  <path d="M165 75 C205 72 205 25 190 22" fill="none" stroke="#111" stroke-linecap="round" stroke-width="12"/>

  <g class="leg leg-a">
    <path d="M78 94 L72 143 L59 151" fill="none" stroke="#111" stroke-linecap="round" stroke-linejoin="round" stroke-width="11"/>
  </g>
  <g class="leg leg-b">
    <path d="M102 97 L108 145 L121 151" fill="none" stroke="#111" stroke-linecap="round" stroke-linejoin="round" stroke-width="11"/>
  </g>
  <g class="leg leg-b">
    <path d="M132 96 L126 143 L114 151" fill="none" stroke="#111" stroke-linecap="round" stroke-linejoin="round" stroke-width="11"/>
  </g>
  <g class="leg leg-a">
    <path d="M154 91 L160 141 L174 149" fill="none" stroke="#111" stroke-linecap="round" stroke-linejoin="round" stroke-width="11"/>
  </g>

  <ellipse cx="121" cy="77" rx="58" ry="32" fill="#111"/>

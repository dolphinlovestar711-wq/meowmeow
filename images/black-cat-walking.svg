  <ellipse cx="86" cy="59" rx="8" ry="10" fill="#fff"/>
  <circle cx="59" cy="61" r="3.5" fill="#111"/>
  <circle cx="86" cy="61" r="3.5" fill="#111"/>
  <path d="M68 73 L77 73 L72.5 80 Z" fill="#fff"/>
  <path d="M51 83 Q73 98 95 82" fill="none" stroke="#ff6b81" stroke-linecap="round" stroke-width="6"/>
  <circle cx="74" cy="94" r="6.5" fill="#ffd166" stroke="#fff" stroke-width="2"/>

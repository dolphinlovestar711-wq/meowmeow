<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 145">
  <style>
    .walking-leg,
    .walking-tail {
      transform-box: fill-box;
    }
    .walking-leg {
      transform-origin: 50% 5%;
    }
    .front-a,
    .back-a {
      animation: step-a .72s ease-in-out infinite alternate;
    }
    .front-b,
    .back-b {
      animation: step-b .72s ease-in-out infinite alternate;
    }
    .walking-tail {
      animation: tail-sway 1.4s ease-in-out infinite alternate;
      transform-origin: 95% 70%;
    }
    @keyframes step-a {
      from { transform: rotate(-9deg); }
      to { transform: rotate(9deg); }
    }
    @keyframes step-b {
      from { transform: rotate(9deg); }
      to { transform: rotate(-9deg); }
    }
    @keyframes tail-sway {
      from { transform: rotate(-3deg); }
      to { transform: rotate(4deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .walking-leg,
      .walking-tail {
        animation: none;
      }
    }
  </style>

  <path class="walking-tail" d="M62 72 C37 73 22 62 25 45 C27 31 39 25 49 31 C37 34 34 43 38 51 C42 60 53 58 65 55" fill="none" stroke="#111" stroke-linecap="round" stroke-width="12"/>

  <g class="walking-leg back-a">
    <path d="M75 85 C73 99 69 113 62 126 C60 130 64 133 74 132" fill="none" stroke="#111" stroke-linecap="round" stroke-linejoin="round" stroke-width="13"/>
  </g>
  <g class="walking-leg back-b">
    <path d="M100 88 C100 102 104 115 111 126 C114 130 109 133 99 132" fill="none" stroke="#111" stroke-linecap="round" stroke-linejoin="round" stroke-width="13"/>
  </g>
  <g class="walking-leg front-b">
    <path d="M151 85 C151 100 155 114 162 126 C165 130 160 133 150 132" fill="none" stroke="#111" stroke-linecap="round" stroke-linejoin="round" stroke-width="13"/>
  </g>
  <g class="walking-leg front-a">
    <path d="M171 81 C169 98 167 114 171 127 C172 131 178 132 185 130" fill="none" stroke="#111" stroke-linecap="round" stroke-linejoin="round" stroke-width="13"/>
  </g>

  <path d="M57 58 C68 41 91 35 119 38 C143 40 158 48 171 60 C177 68 177 80 169 88 C150 96 91 98 66 88 C55 81 52 68 57 58 Z" fill="#111"/>
  <path d="M160 57 C168 48 176 43 185 43 L194 31 L199 45 L215 43 L208 56 C215 62 213 71 206 76 C197 83 183 82 174 75 C168 70 164 64 160 57 Z" fill="#111"/>
  <path d="M204 72 C213 73 218 77 220 82 C215 82 210 80 206 77 Z" fill="#111"/>
</svg>
